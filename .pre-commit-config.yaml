repos:
-   repo: local
    hooks:
    -   id: commit-message
        name: check for proper git commit message
        language: pygrep
        entry: '^[\p{Emoji}]:.{0,65}$'
        args: [--multiline]
        stages: [commit-msg]
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
    - id: ruff
      args: [--fix]
    - id: ruff-format
