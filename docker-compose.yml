services:
  datasette:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - ./my_database.db:/data/my_database.db
      - ./metadata.yaml:/app/metadata.yaml
    environment:
      - TZ=America/Los_Angeles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
